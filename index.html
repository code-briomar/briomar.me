<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briane Lomoni</title>
<style>
  :root {
    --color-persimmon-wash: #fd9b65;
    --color-blush-linen: #e9d1c7;
    --color-candlelight: #f8f5d1;
    --color-sage-whisper: #9ac8ae;
    --color-inkwell-blue: #004b82;
    --color-slate-moss: #4c564b;
    --color-fossil: #a4b1b3;
    --color-obsidian: #000000;
    --color-paper: #ffffff;

    --font-mlrstandard: 'Inter Tight', 'Suisse Int\'l', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

    --text-caption: 16px;
    --leading-caption: 1.3;
    --tracking-caption: 0.16px;
    --text-subheading: 32px;
    --leading-subheading: 1.2;
    --text-display: 331px;
    --leading-display: 0.8;

    --spacing-16: 16px;
    --spacing-32: 32px;
    --spacing-72: 72px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--color-paper);
    color: var(--color-obsidian);
    font-family: var(--font-mlrstandard);
    overflow-x: hidden;
  }

  body {
    scroll-snap-type: y mandatory;
    height: 100vh;
    overflow-y: scroll;
    scroll-behavior: smooth;
  }

  a { color: inherit; text-decoration: none; }

  /* ---------- Contact badge ---------- */
  .contact-badge {
    position: fixed;
    top: 24px;
    right: 8px;
    width: 84px;
    height: 84px;
    background: var(--color-paper);
    color: var(--color-obsidian);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: var(--text-caption);
    line-height: var(--leading-caption);
    letter-spacing: var(--tracking-caption);
    transform: rotate(-16deg);
    z-index: 100;
    border: none;
  }

  /* ---------- Plates ---------- */
  .plate {
    width: 100vw;
    min-height: 100vh;
    scroll-snap-align: start;
    position: relative;
    display: flex;
  }

  .hero {
    background: var(--color-persimmon-wash);
    flex-direction: column;
    justify-content: center;
    padding: var(--spacing-32) var(--spacing-72);
    height: 100vh;
  }

  .display {
    font-weight: 400;
    font-size: clamp(64px, 18vw, var(--text-display));
    line-height: var(--leading-display);
    letter-spacing: clamp(-2px, -0.02em, -6.62px);
  }

  .arrow-down {
    margin-top: var(--spacing-32);
    font-size: clamp(32px, 6vw, 64px);
    line-height: 1;
  }

  /* ---------- Year plate: one section per year ---------- */
  .year-plate {
    height: 100vh;
  }

  .panel.left {
    width: 32%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: var(--spacing-32) var(--spacing-72);
    flex-shrink: 0;
    position: sticky;
    top: 0;
  }

  .year-label {
    font-size: clamp(72px, 11vw, 180px);
    line-height: 0.85;
    letter-spacing: -0.02em;
    font-weight: 400;
  }

  .panel.right {
    width: 68%;
    height: 100vh;
    overflow-y: auto;
    padding: var(--spacing-32) var(--spacing-72) var(--spacing-32) 0;
    display: flex;
    flex-direction: column;
    gap: 56px;
  }

  .project-entry {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-16);
    padding-top: 40px;
    border-top: 1px solid var(--color-obsidian);
  }

  .project-entry:first-child {
    border-top: none;
    padding-top: 0;
  }

  .project-date {
    font-size: var(--text-caption);
    line-height: var(--leading-caption);
    letter-spacing: var(--tracking-caption);
  }

  .project-title {
    font-size: var(--text-subheading);
    line-height: var(--leading-subheading);
    font-weight: 500;
    letter-spacing: -0.01em;
    max-width: 95%;
  }

  .project-title a { border-bottom: 1px solid var(--color-inkwell-blue); color: var(--color-inkwell-blue); }

  .project-tags {
    display: flex;
    gap: var(--spacing-16);
    flex-wrap: wrap;
  }

  .tag {
    font-size: var(--text-caption);
    letter-spacing: var(--tracking-caption);
    border: 1px solid var(--color-obsidian);
    border-radius: 9999px;
    padding: 4px 14px;
  }

  .project-desc {
    font-size: 18px;
    line-height: 1.45;
    max-width: 92%;
  }

  /* ---------- Media gallery ---------- */
  .project-media {
    display: flex;
    gap: var(--spacing-16);
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .media-item {
    width: 220px;
    height: 150px;
    background: var(--color-fossil);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .media-item img,
  .media-item video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .media-item.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    letter-spacing: var(--tracking-caption);
    color: var(--color-obsidian);
    border: 1px dashed var(--color-obsidian);
    background: transparent;
  }

  .media-item .play-badge {
    position: absolute;
    bottom: 8px;
    left: 8px;
    width: 28px;
    height: 28px;
    border-radius: 9999px;
    background: var(--color-inkwell-blue);
    color: var(--color-paper);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  /* ---------- Pagination ---------- */
  .pagination {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100vw;
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--spacing-72);
    z-index: 100;
    pointer-events: none;
  }

  .pagination > * { pointer-events: auto; }

  .arrow-left {
    background: none;
    border: none;
    cursor: pointer;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .counter {
    font-size: var(--text-caption);
    letter-spacing: var(--tracking-caption);
    background: var(--color-paper);
    padding: 4px 10px;
  }

  .circle-next {
    width: 52px;
    height: 52px;
    border-radius: 9999px;
    background: var(--color-inkwell-blue);
    border: none;
    color: var(--color-paper);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  @media (max-width: 720px) {
    .year-plate { flex-direction: column; height: auto; min-height: 100vh; }
    .panel.left { width: 100%; height: auto; position: relative; padding: var(--spacing-32); }
    .panel.right { width: 100%; height: auto; overflow: visible; padding: 0 var(--spacing-32) var(--spacing-72); }
    .display { font-size: clamp(48px, 15vw, 120px); }
    .contact-badge { width: 64px; height: 64px; font-size: 12px; top: 12px; }
    .media-item { width: 45%; height: 120px; }
  }
</style>
</head>

<body>
  <a class="contact-badge" href="mailto:kapolonbraine@gmail.com">Contact &rarr;<br>Briane</a>

  <section class="plate hero">
    <h1 class="display">&copy; Briane<br>Lomoni</h1>
    <div class="arrow-down" aria-hidden="true">&darr;</div>
  </section>

  <div id="plates"></div>

  <nav class="pagination">
    <button class="arrow-left" aria-label="Previous section">&larr;</button>
    <span class="counter">1/1</span>
    <button class="circle-next" aria-label="Next section">&rarr;</button>
  </nav>

  <script>
    /* -----------------------------------------------------------------
       DATA
       Add new projects by pushing into this array — no markup editing
       needed. Group by `year`; each project can carry any number of
       media items (image or video). To add real media, replace a
       media entry with { type: 'image', src: 'photos/thing.jpg' } or
       { type: 'video', src: 'clips/thing.mp4', poster: 'clips/thing.jpg' }.
       Leave media: [] for a project with no visuals yet — a dashed
       placeholder box will show instead so it's easy to spot.
    ----------------------------------------------------------------- */
    const projects = [
      {
        year: 2026,
        date: 'Jul 2026',
        title: 'NoBait — Twitter Feed Cleaner',
        url: null,
        tags: ['AI Tools', 'Browser Extension'],
        desc: 'Browser extension that filters clickbait and outrage-bait from X/Twitter in real time, using an in-browser ML model (transformers.js) plus Claude/Gemini for judgment calls, with local user-guided learning so it adapts per person.',
        media: []
      },
      {
        year: 2025,
        date: 'Mar 2025',
        title: 'Tujulishane Hub',
        url: 'https://github.com/sanCode-2-0/Tujulishane-Hub',
        tags: ['Business Tools', 'Community'],
        desc: 'Full-stack coordination platform connecting organizations, donors, and community projects — Spring Boot + Docker backend, multi-tenant approvals workflow, deployed on Render.',
        media: []
      },
      {
        year: 2024,
        date: 'Aug 2024',
        title: 'ChatFlow + Chat-Flow API + Gemini Proxy',
        url: 'https://github.com/code-briomar/chatFlow',
        tags: ['AI Tools', 'Developer Tools'],
        desc: 'AI chat assistant suite: Java/Spring backend API doing OCR and suggestion generation, an Android client, and a proxy service that routes requests to Google Gemini — three services built to work together.',
        media: []
      },
      {
        year: 2023,
        date: 'Dec 2023',
        title: 'Who to Captain + API',
        url: 'https://github.com/code-briomar/who-to-captain-api',
        tags: ['Sports', 'AI Tools'],
        desc: 'Fantasy Premier League captaincy advisor — API analyzes player form and fixtures to recommend who to captain each gameweek.',
        media: []
      },
      {
        year: 2022,
        date: 'Sep 2022',
        title: 'Health Records Management System',
        url: 'https://github.com/code-briomar/Lomo-gan-san-code',
        tags: ['Healthcare', 'Business Tools'],
        desc: 'Digital health-records platform built and deployed for the sanatorium at Alliance High School — tracks student medical history, medication schedules, and visit logs. In real use from 2021 through 2024, later rebuilt as san-code.',
        media: []
      },
      {
        year: 2021,
        date: 'Jul 2021',
        title: 'Chatbot',
        url: 'https://github.com/code-briomar/Chatbot',
        tags: ['AI Tools'],
        desc: 'PHP-based chatbot — one of the first end-to-end web apps in this timeline.',
        media: []
      }
    ];

    const yearColors = ['var(--color-blush-linen)', 'var(--color-candlelight)', 'var(--color-sage-whisper)'];
    const panelColors = ['var(--color-paper)', 'var(--color-candlelight)', 'var(--color-blush-linen)'];

    function renderMedia(media) {
      if (!media || media.length === 0) {
        return `<div class="media-item placeholder">+ add image / video</div>`;
      }
      return media.map(m => {
        if (m.type === 'video') {
          return `<div class="media-item">
            <video src="${m.src}" ${m.poster ? `poster="${m.poster}"` : ''} muted loop playsinline controls></video>
            <span class="play-badge">&#9654;</span>
          </div>`;
        }
        return `<div class="media-item"><img src="${m.src}" alt="${m.alt || ''}"></div>`;
      }).join('');
    }

    function renderProject(p) {
      const titleHtml = p.url
        ? `<a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.title}</a>`
        : p.title;
      return `
        <div class="project-entry">
          <span class="project-date">${p.date}</span>
          <h2 class="project-title">${titleHtml}</h2>
          <div class="project-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <p class="project-desc">${p.desc}</p>
          <div class="project-media">${renderMedia(p.media)}</div>
        </div>
      `;
    }

    // group projects by year, preserving first-seen order (desc by year already)
    const years = [...new Set(projects.map(p => p.year))];

    const platesRoot = document.getElementById('plates');
    years.forEach((year, i) => {
      const yearProjects = projects.filter(p => p.year === year);
      const section = document.createElement('section');
      section.className = 'plate year-plate';
      section.style.background = yearColors[i % yearColors.length];
      section.innerHTML = `
        <div class="panel left" style="background:${yearColors[i % yearColors.length]}">
          <div class="year-label">${year}</div>
        </div>
        <div class="panel right" style="background:${panelColors[i % panelColors.length]}">
          ${yearProjects.map(renderProject).join('')}
        </div>
      `;
      platesRoot.appendChild(section);
    });

    /* -----------------------------------------------------------------
       PAGINATION
    ----------------------------------------------------------------- */
    const plates = Array.from(document.querySelectorAll('.plate'));
    const counter = document.querySelector('.counter');
    const prevBtn = document.querySelector('.arrow-left');
    const nextBtn = document.querySelector('.circle-next');
    let current = 0;

    function updateCounter() {
      counter.textContent = `${current + 1}/${plates.length}`;
    }

    function goTo(index) {
      if (index < 0 || index >= plates.length) return;
      current = index;
      plates[current].scrollIntoView({ behavior: 'smooth' });
      updateCounter();
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          current = plates.indexOf(entry.target);
          updateCounter();
        }
      });
    }, { threshold: 0.5 });

    plates.forEach(p => observer.observe(p));
    updateCounter();
  </script>
</body>
</html>
